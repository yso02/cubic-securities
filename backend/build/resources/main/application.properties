spring.application.name=capstone

kis.api.url=https://openapi.koreainvestment.com:9443
fmp.api.url=https://financialmodelingprep.com/stable
claude.api.url=https://api.anthropic.com

spring.config.import=application-secret.properties

spring.datasource.url=jdbc:mysql://localhost:3306/capstone?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

kis.ws.url=ws://ops.koreainvestment.com:21000

spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536